bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered_map 
    enable_groot_monitoring: True
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_distance_traveled_condition_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15
      stateful: True

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      allow_reversing: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.3
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_vel_theta: -0.9
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.3
      acc_lim_x: 0.3
      acc_lim_y: 0.0
      acc_lim_theta: 3.0
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.0
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 20
      sim_time: 2.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.15
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal","Oscillation" , "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      RotateToGoal.slowing_factor: 5.0    
      RotateToGoal.lookahead_time: 0.5
      BaseObstacle.scale: 0.01
      Oscillation.scale: 1.0 
      oscillation_reset_dist: 1.0
      oscillation_reset_angle: 0.5
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.05
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.05
      PathDist.scale: 16.0
      GoalDist.scale: 12.0
      RotateToGoal.scale: 16.0       

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      track_unknown_space: false
      always_send_full_costmap: true
      transform_tolerance: 0.5
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[-0.25, -0.235], [0.35, -0.235], [0.35, 0.235], [-0.25, 0.235]]"   # CONFIRM matches real footprint
      footprint_padding: 0.1
      plugins: ["lidar_obstacle_layer", "sonar_layer", "inflation_layer"]
      
      lidar_obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        combination_method: 1            
        clearable_area_radius: 5.0       
        observation_sources: scan
        scan:
          topic: /lidar
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_max_range: 11.0       
          obstacle_min_range: 0.5        
          raytrace_max_range: 12.0       
          raytrace_min_range: 0.0
          expected_update_rate: 0.15

      sonar_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        enabled: true
        topics: ["/ultrasound/front", "/ultrasound/rear", "/ultrasound/left", "/ultrasound/right","/ultrasound/fe", "/ultrasound/fd", "/ultrasound/te", "/ultrasound/td"]
        inflate_cone: 1.0
        no_readings_timeout: 1.0
        clear_threshold: 0.2
        mark_threshold: 0.7
        clear_on_max_reading: true
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 1.0

  local_costmap_client:
    ros__parameters:
      use_sim_time: True

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 2.0
      unknown_cost_value: -1
      lethal_cost_threshold: 253
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      transform_tolerance: 0.5
      footprint: "[[-0.25, -0.235], [0.35, -0.235], [0.35, 0.235], [-0.25, 0.235]]"   # CONFIRM matches real footprint
      footprint_padding: 0.1
      resolution: 0.1
      track_unknown_space: true
      allow_unknown: true
      rolling_window: true
      width: 40                   
      height: 40
      always_send_full_costmap: True
      plugins: ["static_layer", "front_obstacle_layer", "inflation_layer"] 
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        subscribe_to_updates: True
        lethal_cost_threshold: 100
        unknown_cost_value: -1
        trinary_costmap: false
        use_maximum: false

      front_obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        combination_method: 1
        scan:
          topic: /lidar  
          sensor_frame: lazer_frame
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          expected_update_rate: 0.0
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 1.0 

  global_costmap_client:
    ros__parameters:
      use_sim_time: True

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 1.0
      use_astar: false
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "back_up", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    back_up:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: true
    simulate_ahead_time: 0.5
    max_rotational_vel: 0.8
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.0
    back_up.speed: -0.25

robot_state_publisher:
  ros__parameters:
    use_sim_time: True