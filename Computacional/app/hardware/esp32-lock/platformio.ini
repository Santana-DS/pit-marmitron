; =============================================================================
; platformio.ini
;
; UnBot Delivery — ESP32 Firmware v4.0 (TFT ST7789V + QR Code)
; -----------------------------------------------------------------------------
; DISPLAY CHANGE FROM v3.0:
;   Removed: adafruit/Adafruit SSD1306, adafruit/Adafruit GFX Library
;   Added  : bodmer/TFT_eSPI
;
; TFT_eSPI pin/driver config lives in include/User_Setup.h — the library
; reads it at compile time via the -DUSER_SETUP_LOADED flag below.
;
; ricmoo/QRCode is unchanged — same stack-only QR generation as v3.0.
; =============================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -D USER_SETUP_LOADED=1
    -include include/User_Setup.h
    -D CORE_DEBUG_LEVEL=1
    -D ARDUINOJSON_ENABLE_COMMENTS=0

lib_deps =
    knolleary/PubSubClient  @ ^2.8
    bblanchon/ArduinoJson   @ ^7.0
    ricmoo/QRCode           @ ^0.0.1
    bodmer/TFT_eSPI         @ ^2.5.43

; Tell TFT_eSPI where to find User_Setup.h — must match your project layout.
; If User_Setup.h is in include/, this is correct.
; If you placed it inside the TFT_eSPI lib directory instead, remove this line.
lib_extra_dirs =
    include
