# docker-compose.dev.yml
# Ambiente de desenvolvimento local
# Uso: podman compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: unbot-postgres-dev
    environment:
      POSTGRES_DB: unbot_delivery
      POSTGRES_USER: unbot
      POSTGRES_PASSWORD: unbot_dev
    ports:
      - "5432:5432"
    volumes:
      - unbot_postgres_dev_data:/var/lib/postgresql/data
      - ./database/001_extensions.up.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
      - ./database/010_users.up.sql:/docker-entrypoint-initdb.d/010_users.sql:ro
      - ./database/020_restaurants.up.sql:/docker-entrypoint-initdb.d/020_restaurants.sql:ro
      - ./database/030_products.up.sql:/docker-entrypoint-initdb.d/030_products.sql:ro
      - ./database/040_orders.up.sql:/docker-entrypoint-initdb.d/040_orders.sql:ro
      - ./database/050_order_items.up.sql:/docker-entrypoint-initdb.d/050_order_items.sql:ro
      - ./database/seeds/001_sample_data.sql:/docker-entrypoint-initdb.d/100_seed_sample_data.sql:ro
      - ./database/seeds/002_orders_data.sql:/docker-entrypoint-initdb.d/101_seed_orders_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbot -d unbot_delivery"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - unbot-dev

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: unbot-gateway-dev
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://unbot:unbot_dev@postgres:5432/unbot_delivery?sslmode=disable
      MQTT_HOST: host.docker.internal
      MQTT_PORT: "1883"
      MQTT_USER: gateway
      MQTT_PASSWORD: gateway_dev
      MQTT_CLIENT_ID: unbot-gateway-dev
      MQTT_COMMAND_TOPIC: robot/commands
      MQTT_STATUS_TOPIC: robot/status
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unbot-dev
    restart: unless-stopped

  mobile-web:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: unbot-mobile-web-dev
    ports:
      - "8081:80"
    depends_on:
      - gateway
    networks:
      - unbot-dev
    restart: unless-stopped

volumes:
  unbot_postgres_dev_data:
    name: unbot_postgres_dev_data

networks:
  unbot-dev:
    name: unbot-dev-network
    driver: bridge
