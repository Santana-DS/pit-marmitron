# docker-compose.prod.yml
# Ambiente de produção
# Uso: podman compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: unbot-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unbot_delivery}
      POSTGRES_USER: ${POSTGRES_USER:-unbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - unbot_postgres_prod_data:/var/lib/postgresql/data
      - ./database/001_extensions.up.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
      - ./database/010_users.up.sql:/docker-entrypoint-initdb.d/010_users.sql:ro
      - ./database/020_restaurants.up.sql:/docker-entrypoint-initdb.d/020_restaurants.sql:ro
      - ./database/030_products.up.sql:/docker-entrypoint-initdb.d/030_products.sql:ro
      - ./database/040_orders.up.sql:/docker-entrypoint-initdb.d/040_orders.sql:ro
      - ./database/050_order_items.up.sql:/docker-entrypoint-initdb.d/050_order_items.sql:ro
      - ./database/070_delivery_points.up.sql:/docker-entrypoint-initdb.d/070_delivery_points.sql:ro
      - ./database/080_navigation_routes.up.sql:/docker-entrypoint-initdb.d/080_navigation_routes.sql:ro
      # Não incluir seeds em produção
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unbot} -d ${POSTGRES_DB:-unbot_delivery}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unbot-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: unbot-gateway-prod
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-unbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-unbot_delivery}?sslmode=disable
      MQTT_HOST: ${MQTT_HOST:?MQTT_HOST must be set}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:?MQTT_USER must be set}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD must be set}
      MQTT_CLIENT_ID: unbot-gateway-prod
      MQTT_COMMAND_TOPIC: robot/commands
      MQTT_STATUS_TOPIC: robot/status
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unbot-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  mobile-web:
    build:
      context: ./mobile
      dockerfile: Dockerfile.prod
      args:
        API_BASE_URL: ${API_BASE_URL:?API_BASE_URL must be set}
    container_name: unbot-mobile-web-prod
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - gateway
    networks:
      - unbot-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  unbot_postgres_prod_data:
    name: unbot_postgres_prod_data

networks:
  unbot-prod:
    name: unbot-prod-network
    driver: bridge
